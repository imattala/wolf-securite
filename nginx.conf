# nginx.conf

events { }

http {
  include       mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri /index.html;
    }

    location /about {
    try_files $uri /index.html;
    }

    location /services {
    try_files $uri /index.html;
    }

    location /contact {
    try_files $uri /index.html;
    }

    error_page 404 /index.html;
  }
}

